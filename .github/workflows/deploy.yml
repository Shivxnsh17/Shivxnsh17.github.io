name: Deploy Portfolio and Notes to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Quartz Content
        run: |
          # Copy all the models and readmes into quartz content
          # We copy specific folders to avoid copying quartz into quartz
          cp -r "DCF" "DDM" "Relative Valuation" "Risk Calculation" "WACC" quartz/content/
          # Copy the main README as the index of the notes
          cp README.md quartz/content/index.md

      - name: Install dependencies and Build Quartz
        working-directory: ./quartz
        run: |
          npm ci
          npx quartz build

      - name: Prepare final deployment folder
        run: |
          mkdir dist
          # Copy the custom portfolio homepage
          cp docs/index.html dist/index.html
          # Move the compiled Quartz site into the notes/ folder
          mv quartz/public dist/notes

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
