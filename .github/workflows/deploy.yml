name: Deploy Portfolio and Notes to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Content
        run: |
          mkdir build_content
          cp -r "DCF" "DDM" "Relative Valuation" "Risk Calculation" "WACC" README.md build_content/
          # Rename all README.md files to index.md so Quartz treats them as folder landing pages
          find build_content -name "README.md" -execdir mv {} index.md \;

      - name: Install dependencies and Build Quartz
        working-directory: ./quartz
        run: |
          npm ci
          npx quartz build -d ../build_content

      - name: Prepare final deployment folder
        run: |
          mkdir dist
          # Move the compiled Quartz site into the notes/ folder
          mv quartz/public dist/notes
          # Now overwrite the root index with the custom portfolio homepage
          cp docs/index.html dist/index.html
          # Copy resume PDF and portrait image to root
          cp "Shivansh.Chandra Resume.pdf" dist/
          cp docs/shivansh.jpeg dist/shivansh.jpeg
          # Copy raw Excel and PDF files into notes/ preserving structure
          find DCF DDM "Relative Valuation" "Risk Calculation" WACC -type f -name "*.xlsx" -exec cp --parents {} dist/notes/ \;
          find "Relative Valuation" -type f -name "*.pdf" -exec cp --parents {} dist/notes/ \;

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
